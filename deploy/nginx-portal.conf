# 身内ポータル用 nginx 設定
# 配置:  /etc/nginx/sites-available/portal  に置き、sites-enabled へリンク
#   sudo cp deploy/nginx-portal.conf /etc/nginx/sites-available/portal
#   sudo ln -sf /etc/nginx/sites-available/portal /etc/nginx/sites-enabled/portal
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# server_name は no-ip 等で取得したホスト名に置き換えてください。

server {
    listen 80;
    listen [::]:80;
    server_name example.ddns.net;        # ← あなたのドメインに変更

    root /var/www/portal/public;
    index index.php;
    charset utf-8;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # 隠しファイル(.env 等)へのアクセス遮断。.well-known は許可(certbot用)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
