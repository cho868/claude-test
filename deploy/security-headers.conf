# セキュリティヘッダ（nginx 全体に適用）
# 配置:  /etc/nginx/conf.d/security-headers.conf
#   sudo cp deploy/security-headers.conf /etc/nginx/conf.d/security-headers.conf
#   sudo nginx -t && sudo systemctl reload nginx
# ※ deploy/harden-server.sh が自動で配置します。

# ブラウザの MIME スニッフィングを禁止
add_header X-Content-Type-Options "nosniff" always;
# クリックジャッキング対策（iframe 埋め込み禁止）
add_header X-Frame-Options "SAMEORIGIN" always;
# リファラの送信を最小限に
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# 不要な権限を既定で無効化
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
# HSTS（HTTPS を常用する宣言。HTTPS が安定してから有効）
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# nginx バージョンを隠す
server_tokens off;
